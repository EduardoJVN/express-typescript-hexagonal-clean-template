name: Main Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality-check:
    name: 🔍 Calidad (Lint & Test)
    if: github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'yarn'
      - name: 📦 Install
        run: yarn install --frozen-lockfile
      - name: 🔍 Lint & Test
        run: |
          yarn lint
          yarn test

  build-check:
    name: 🏗️ Build Verification
    needs: quality-check
    if: github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'yarn'
      - name: 📦 Install
        run: yarn install --frozen-lockfile
      - name: 🏗️ Build
        run: yarn build

  release-please:
    name: 🔖 Release Please
    needs: build-check
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          release-type: node

  deploy:
    name: 🚀 Build & Push to GHCR (${{ needs.release-please.outputs.tag_name }})
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: ⬇️ Checkout ${{ needs.release-please.outputs.tag_name }}
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: 🔐 Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🏷️ Set Variables
        id: vars
        run: |
          REPO="${GITHUB_REPOSITORY,,}"
          TAG="${{ needs.release-please.outputs.tag_name }}"
          echo "tags<<EOF" >> $GITHUB_OUTPUT
          echo "ghcr.io/${REPO}:dev" >> $GITHUB_OUTPUT
          echo "ghcr.io/${REPO}:latest" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: 🏗️ Build and Push Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.vars.outputs.tags }}

      - name: ✅ Summary
        run: |
          echo "Imagen publicada con tags: dev, qa, ${{ needs.release-please.outputs.tag_name }}, latest"

